name: v2ray_box_example
description: "Demonstrates how to use the v2ray_box plugin."
publish_to: 'none'

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  v2ray_box:
    path: ../
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1
  share_plus: ^11.0.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
